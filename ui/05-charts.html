<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body class="{{THEME}}">
  {{STATUSBAR}}

  <div class="card">
    <div class="ctitle">CPU
      <span class="r"><span class="l1d">占用 {{CPUUSAGE}}%</span><span class="l2d">温度 {{CPUTEMP}}°C</span></span>
    </div>
    <div id="chart-cpu" class="chart"></div>
  </div>

  <div class="card">
    <div class="ctitle">内存 <span class="r l3d">{{MEM}}% · {{MEMDETAIL}}</span></div>
    <div id="chart-mem" class="chart sm"></div>
  </div>

  <div class="card">
    <div class="ctitle">网速
      <span class="r"><span class="l1d">↓ {{RXSPEED}}</span><span class="l2d">↑ {{TXSPEED}}</span></span>
    </div>
    <div id="chart-net" class="chart"></div>
  </div>

  <div class="card">
    <div class="ctitle">电池
      <span class="r"><span class="l2d">温度 {{BATTEMP}}°C</span><span class="l1d">{{BATPWRLBL}} {{BATPWR}}w</span></span>
    </div>
    <div id="chart-batt" class="chart"></div>
  </div>

  {{CHARTINTERVALS}}

  <div class="pgpad"></div>
  {{DOTS}}
</body>
</html>
